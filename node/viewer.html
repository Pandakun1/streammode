<!DOCTYPE html>
<html>
<head>
    <title>FiveM Live Stream</title>
    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial;
        }

        img {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>
    <img id="stream" />

    <script>
        const ws = new WebSocket('ws://localhost:8080');
        const img = document.getElementById('stream');

        ws.binaryType = 'arraybuffer';

        ws.onmessage = (event) => {
            const blob = new Blob([event.data], { type: 'image/webp' });
            const url = URL.createObjectURL(blob);

            img.src = url;

            // Speicher freigeben
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        };

        ws.onopen = () => console.log('Connected to stream');
        ws.onclose = () => console.log('Disconnected');
    </script>
</body>
</html>
